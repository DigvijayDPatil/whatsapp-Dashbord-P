<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - WABA Recover</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Apply theme early to prevent flash
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-mode');
        }
        
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Custom styling -->
    <style>
        body {
            background-color: #070913;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
        }
        .forgot-card {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        .glow-pulse-icon {
            animation: iconPulse 2s infinite alternate;
        }
        @keyframes iconPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(99, 102, 241, 0.2)); }
            100% { transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.5)); }
        }

        /* Light mode overrides */
        html.light-mode body {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.04) 0%, transparent 40%);
            color: #0f172a;
        }
        html.light-mode .forgot-card {
            background-color: #ffffff;
            border-color: rgba(226, 232, 240, 0.8);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02), inset 0 1px 0 rgba(255, 255, 255, 1);
        }
        html.light-mode h1 {
            color: #0f172a !important;
        }
        html.light-mode p, html.light-mode label {
            color: #475569 !important;
        }
        html.light-mode input {
            background-color: #f8fafc !important;
            border-color: #cbd5e1 !important;
            color: #0f172a !important;
        }
        html.light-mode input:focus {
            background-color: #ffffff !important;
            border-color: #6366f1 !important;
        }
        html.light-mode a {
            color: #4f46e5 !important;
        }
        html.light-mode a:hover {
            color: #4338ca !important;
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex items-center justify-center p-4">

    <div class="w-full max-w-md forgot-card rounded-3xl p-8 md:p-10 space-y-8 relative overflow-hidden">
        
        <!-- Subtle gradient background flow inside card -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/5 rounded-full blur-3xl -z-10"></div>
        <div class="absolute bottom-0 left-0 w-32 h-32 bg-violet-500/5 rounded-full blur-3xl -z-10"></div>

        <!-- Header Brand Logo -->
        <div class="flex flex-col items-center text-center space-y-3">
            <div class="relative flex items-center justify-center w-12 h-12 rounded-2xl bg-gradient-to-tr from-indigo-600 to-violet-600 text-white shadow-lg shadow-indigo-500/30 glow-pulse-icon">
                <i data-lucide="key-round" class="w-6 h-6 z-10"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight flex items-center justify-center gap-1">
                    Reset <span class="bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">Password</span>
                </h1>
                <p class="text-xs text-slate-400 mt-1.5 font-medium">Verify credentials to reset account password</p>
            </div>
        </div>

        <!-- Display warning errors if verification fails -->
        {% if error_msg %}
        <div class="p-4 bg-rose-500/10 border border-rose-500/25 rounded-2xl flex items-start gap-3 text-rose-455 animate-shake">
            <i data-lucide="alert-circle" class="w-4 h-4 shrink-0 mt-0.5 text-rose-400"></i>
            <div class="text-[11px] font-medium leading-relaxed">{{ error_msg }}</div>
        </div>
        {% endif %}

        <!-- Display success message if password reset completes -->
        {% if success_msg %}
        <div class="p-4 bg-emerald-500/10 border border-emerald-500/25 rounded-2xl flex items-start gap-3 text-emerald-450">
            <i data-lucide="check-circle" class="w-4 h-4 shrink-0 mt-0.5 text-emerald-400"></i>
            <div class="text-[11px] font-medium leading-relaxed">{{ success_msg }}</div>
        </div>
        {% endif %}

        <form method="POST" class="space-y-4" autocomplete="off">
            {% csrf_token %}
            
            <!-- Username Input -->
            <div class="space-y-1.5">
                <label for="username" class="text-[10px] font-bold text-slate-450 tracking-wider uppercase flex items-center gap-1.5">
                    <i data-lucide="user" class="w-3.5 h-3.5 text-indigo-400"></i>
                    Username
                </label>
                <input type="text" id="username" name="username" placeholder="e.g. admin" required autocomplete="off"
                    class="w-full text-xs px-4 py-3 bg-slate-900/60 border border-slate-800 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-semibold">
            </div>

            <!-- Email Input -->
            <div class="space-y-1.5">
                <label for="email" class="text-[10px] font-bold text-slate-450 tracking-wider uppercase flex items-center gap-1.5">
                    <i data-lucide="mail" class="w-3.5 h-3.5 text-indigo-400"></i>
                    Registered Email Address
                </label>
                <input type="email" id="email" name="email" placeholder="e.g. admin@waba.com" required autocomplete="off"
                    class="w-full text-xs px-4 py-3 bg-slate-900/60 border border-slate-800 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-semibold">
            </div>

            <!-- New Password Input -->
            <div class="space-y-1.5">
                <label for="new_password" class="text-[10px] font-bold text-slate-450 tracking-wider uppercase flex items-center gap-1.5">
                    <i data-lucide="lock" class="w-3.5 h-3.5 text-indigo-400"></i>
                    New Password
                </label>
                <input type="password" id="new_password" name="new_password" placeholder="••••••••" required autocomplete="new-password"
                    class="w-full text-xs px-4 py-3 bg-slate-900/60 border border-slate-800 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-semibold">
            </div>

            <!-- Password Confirm Input -->
            <div class="space-y-1.5">
                <label for="new_password_confirm" class="text-[10px] font-bold text-slate-450 tracking-wider uppercase flex items-center gap-1.5">
                    <i data-lucide="shield-check" class="w-3.5 h-3.5 text-indigo-400"></i>
                    Confirm New Password
                </label>
                <input type="password" id="new_password_confirm" name="new_password_confirm" placeholder="••••••••" required autocomplete="new-password"
                    class="w-full text-xs px-4 py-3 bg-slate-900/60 border border-slate-800 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-semibold">
            </div>

            <!-- Action Button -->
            <button type="submit" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl flex items-center justify-center gap-2 cursor-pointer shadow-md hover:-translate-y-0.5 transition-all text-xs mt-2">
                <i data-lucide="check" class="w-4 h-4"></i>
                Reset Password
            </button>
        </form>

        <!-- Toggle Login Link -->
        <div class="text-center pt-2">
            <p class="text-xs text-slate-400">
                Remember your password? 
                <a href="{% url 'login' %}" class="text-indigo-400 font-bold hover:text-indigo-300 hover:underline transition-colors ml-1">Sign In</a>
            </p>
        </div>

    </div>

    <!-- Initialize Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
